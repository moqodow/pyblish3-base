environment:
  matrix:
    - PYTHON: "C:\\Python310-x64"
      PYTHON_VERSION: "3.10"
      PYTHON_ARCH: "64"

    - PYTHON: "C:\\Python311-x64"
      PYTHON_VERSION: "3.11"
      PYTHON_ARCH: "64"

    - PYTHON: "C:\\Python312-x64"
      PYTHON_VERSION: "3.12"
      PYTHON_ARCH: "64"

    - PYTHON: "C:\\Python313-x64"
      PYTHON_VERSION: "3.13"
      PYTHON_ARCH: "64"

    - PYTHON: "C:\\Python314-x64"
      PYTHON_VERSION: "3.14"
      PYTHON_ARCH: "64"

install:
  - ps: $env:Path = $env:Path -replace '[cC]:\\[pP]ython[0-9]+[a-zA-Z0-9-_.\\]*\;'
  - SET PATH=%PYTHON%;%PYTHON%\\Scripts;%PATH%
  - powershell -ExecutionPolicy ByPass -c "irm https://astral.sh/uv/0.11.17/install.ps1 | iex"
  - ps: $env:Path = "$env:USERPROFILE\.local\bin;$env:Path"

build_script:
  - uv run --python %PYTHON_VERSION% --with nose2 --with coverage coverage erase
  - uv run --python %PYTHON_VERSION% --with nose2 --with coverage coverage run -m nose2 --with-doctest
  - uv run --python %PYTHON_VERSION% --with nose2 --with coverage coverage report
  - uv run --python %PYTHON_VERSION% --with nose2 --with coverage coverage html
